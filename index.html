<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>排班填報系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f5;color:#222;}
.app{font-family:Arial,sans-serif;padding:1rem;max-width:600px;margin:0 auto;}
button{cursor:pointer;font-family:inherit;font-size:13px;padding:6px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;}
button:hover{background:#f0f0f0;}
.btn-blue{background:#E6F1FB;color:#0C447C;border-color:#85B7EB;}
.btn-blue:hover{background:#B5D4F4;}
.btn-teal{background:#E1F5EE;color:#085041;border-color:#5DCAA5;}
.btn-red{color:#791F1F;border-color:#F09595;}
.btn-red:hover{background:#FCEBEB;}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;outline:none;}
input:focus,select:focus{box-shadow:0 0 0 2px #85B7EB;}
.screen{display:none;}.screen.active{display:block;}
.topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.topbar h2{font-size:17px;font-weight:500;color:#222;flex:1;min-width:80px;}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge-teal{background:#E1F5EE;color:#085041;}
.badge-amber{background:#FAEEDA;color:#633806;}
.badge-gray{background:#f5f5f5;color:#666;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:#f5f5f5;border-radius:8px;padding:10px;text-align:center;}
.stat-lbl{font-size:11px;color:#666;margin-bottom:3px;}
.stat-val{font-size:20px;font-weight:500;color:#222;}
.stat-val.ok{color:#0F6E56;}.stat-val.warn{color:#854F0B;}
.tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid #e8e8e8;}
.tab{padding:8px 12px;font-size:13px;border:none;background:transparent;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;}
.tab.active{color:#0C447C;border-bottom-color:#378ADD;font-weight:500;}
.tsec{display:none;}.tsec.active{display:block;}
.progress-bar{height:5px;border-radius:3px;background:#e8e8e8;}
.progress-fill{height:5px;border-radius:3px;}
.toggle-btn{display:inline-flex;align-items:center;justify-content:center;font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;border:1px solid #ccc;background:#f5f5f5;color:#888;}
.toggle-btn.on-am{background:#E1F5EE;color:#085041;border-color:#5DCAA5;font-weight:500;}
.toggle-btn.on-pm{background:#FAEEDA;color:#633806;border-color:#FAC775;font-weight:500;}
.day-list-row{display:flex;align-items:center;padding:11px 4px;border-bottom:1px solid #f0f0f0;cursor:pointer;-webkit-tap-highlight-color:transparent;border-radius:6px;}
.day-list-row:last-child{border-bottom:none;}
.day-list-row:active{background:#f9f9f9;}
.day-date{width:46px;flex-shrink:0;font-size:12px;color:#666;line-height:1.5;text-align:center;}
.day-date.we{color:#A32D2D;}
.day-slots{flex:1;display:flex;flex-direction:column;gap:4px;}
.slot-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:6px;font-weight:500;}
.slot-tag.am{background:#E1F5EE;color:#085041;}
.slot-tag.pm{background:#FAEEDA;color:#633806;}
.slot-tag.empty{background:#f5f5f5;color:#aaa;font-weight:400;}
.day-gap{display:flex;flex-direction:column;gap:3px;margin-left:6px;width:72px;flex-shrink:0;}
.gap-pill{font-size:11px;padding:2px 6px;border-radius:4px;text-align:center;white-space:nowrap;}
.gap-need{background:#FAEEDA;color:#633806;}
.gap-full{background:#E1F5EE;color:#085041;}
.day-arrow{color:#ccc;font-size:16px;margin-left:4px;flex-shrink:0;}
.overview-row{display:grid;grid-template-columns:46px 1fr;gap:6px;padding:8px 0;border-bottom:1px solid #f0f0f0;}
.overview-row:last-child{border-bottom:none;}
.ov-slots{display:flex;flex-direction:column;gap:5px;}
.ov-slot-row{display:flex;align-items:flex-start;gap:6px;}
.ov-slot-lbl{font-size:11px;font-weight:500;width:28px;flex-shrink:0;padding-top:2px;}
.ov-slot-lbl.am{color:#085041;}.ov-slot-lbl.pm{color:#633806;}
.ov-chips{display:flex;flex-wrap:wrap;gap:3px;flex:1;}
.wk-row{display:grid;grid-template-columns:36px 1fr 1fr;gap:6px;align-items:start;padding:7px 0;border-bottom:1px solid #f0f0f0;}
.wk-row:last-child{border-bottom:none;}
.pref-day-row{display:grid;grid-template-columns:46px 1fr 1fr;gap:6px;align-items:start;padding:7px 0;border-bottom:1px solid #f0f0f0;}
.pref-day-row:last-child{border-bottom:none;}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;padding:1rem;}
.overlay.show{display:flex;}
.modal-box{background:#fff;border:1px solid #ddd;border-radius:12px;width:100%;max-width:360px;padding:1.25rem;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:500;color:#222;margin-bottom:.75rem;}
.modal-gap-row{display:flex;gap:8px;margin-bottom:.75rem;}
.modal-gap-pill{flex:1;text-align:center;padding:6px 8px;border-radius:8px;font-size:12px;font-weight:500;}
.slot-section{background:#f5f5f5;border-radius:12px;padding:.875rem;margin-bottom:.75rem;}
.slot-section.pref-border{border:1px solid #FAC775;}
.big-checkbox{width:22px;height:22px;cursor:pointer;accent-color:#1D9E75;flex-shrink:0;}
.time-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
.time-row select{flex:1;font-size:14px;padding:9px 8px;}
</style>
</head>
<body>
<div class="app">

<div id="scr-login" class="screen active">
  <div style="display:flex;align-items:center;justify-content:center;min-height:300px;">
    <div style="width:100%;max-width:320px;">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div style="font-size:22px;font-weight:500;color:#222;margin-bottom:4px;">排班填報系統</div>
        <div style="font-size:14px;color:#666;">請選擇身份登入</div>
      </div>
      <div class="card" style="margin:0;">
        <div style="margin-bottom:12px;">
          <div style="font-size:13px;color:#666;margin-bottom:6px;">身份</div>
          <select id="loginRole" style="width:100%;">
            <option value="">-- 請選擇 --</option>
            <option value="admin">管理者</option>
            <optgroup id="staffOpts" label="── 人員 ──"></optgroup>
          </select>
        </div>
        <button class="btn-blue" style="width:100%;padding:11px;font-size:15px;" onclick="doLogin()">登入</button>
      </div>
    </div>
  </div>
</div>

<div id="scr-overview" class="screen">
  <div class="topbar">
    <h2>本月排班總覽</h2>
    <div style="display:flex;align-items:center;gap:4px;">
      <button onclick="prevM_ov()">&#8249;</button>
      <span id="ovMonLbl" style="font-size:13px;font-weight:500;color:#222;min-width:72px;text-align:center;"></span>
      <button onclick="nextM_ov()">&#8250;</button>
    </div>
    <button id="ovActionBtn" class="btn-blue" style="display:none;"></button>
    <button onclick="goLogin()">登出</button>
  </div>
  <div class="card" style="padding:.75rem 1rem;margin-bottom:.75rem;">
    <div style="font-size:12px;color:#666;margin-bottom:8px;">查看所有人排班及缺額，再前往填寫</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;" id="ovLegend"></div>
  </div>
  <div class="card" style="padding:.75rem 1rem;"><div id="ovBody"></div></div>
</div>

<div id="scr-staff" class="screen">
  <div class="topbar">
    <h2 id="staffTitle"></h2>
    <div style="display:flex;align-items:center;gap:4px;">
      <button onclick="prevM_staff()">&#8249;</button>
      <span id="staffMonLbl" style="font-size:13px;font-weight:500;color:#222;min-width:72px;text-align:center;"></span>
      <button onclick="nextM_staff()">&#8250;</button>
    </div>
    <button onclick="goToOv()">&#8592; 總覽</button>
    <button onclick="goLogin()">登出</button>
  </div>
  <div class="stat-grid" id="staffStats"></div>
  <div id="prefHintBar" style="margin-bottom:.75rem;"></div>
  <div class="card" style="padding:.75rem 1rem;">
    <div style="font-size:12px;color:#666;margin-bottom:10px;">點擊任一天填寫排班</div>
    <div id="staffDayList"></div>
  </div>
</div>

<div id="scr-admin" class="screen">
  <div class="topbar">
    <h2>管理者</h2>
    <div style="display:flex;align-items:center;gap:4px;">
      <button onclick="prevM()">&#8249;</button>
      <span id="adminMonLbl" style="font-size:13px;font-weight:500;color:#222;min-width:72px;text-align:center;"></span>
      <button onclick="nextM()">&#8250;</button>
    </div>
    <button class="btn-blue" onclick="doPrint()">列印</button>
    <button onclick="goLogin()">登出</button>
  </div>
  <div class="stat-grid" id="adminStats"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">每日總覽</button>
    <button class="tab" onclick="switchTab('people',this)">人員</button>
    <button class="tab" onclick="switchTab('pref',this)">偏好時段</button>
  </div>
  <div id="tab-overview" class="tsec active">
    <div class="card" style="padding:.75rem 1rem;"><div id="adminOv"></div></div>
  </div>
  <div id="tab-people" class="tsec">
    <div class="card" style="padding:.75rem 1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:13px;font-weight:500;">人員列表</div>
        <div style="display:flex;gap:6px;"><input type="text" id="newName" placeholder="新增人員姓名" style="width:130px;"><button class="btn-teal" onclick="addStaff()">新增</button></div>
      </div>
      <div id="adminPeople"></div>
    </div>
  </div>
  <div id="tab-pref" class="tsec">
    <div class="card" style="padding:.75rem 1rem;">
      <div style="font-size:13px;font-weight:500;margin-bottom:4px;">偏好時段設定</div>
      <div style="font-size:12px;color:#666;margin-bottom:12px;">先設定「每週模板」再套用到本月，個別日期仍可單獨修改。</div>
      <div style="background:#f5f5f5;border-radius:12px;padding:.875rem;margin-bottom:1rem;">
        <div style="font-size:13px;font-weight:500;margin-bottom:8px;">每週模板</div>
        <div style="display:grid;grid-template-columns:36px 1fr 1fr;gap:6px;margin-bottom:6px;">
          <div style="font-size:11px;color:#aaa;">星期</div>
          <div style="font-size:11px;color:#aaa;">上午</div>
          <div style="font-size:11px;color:#aaa;">下午</div>
        </div>
        <div id="weekTemplate"></div>
        <button class="btn-teal" style="width:100%;margin-top:10px;padding:9px;" onclick="applyWeekTemplate()">套用模板到本月所有日期</button>
      </div>
      <div style="font-size:13px;font-weight:500;margin-bottom:6px;">個別日期微調</div>
      <div style="display:grid;grid-template-columns:46px 1fr 1fr;gap:6px;margin-bottom:6px;">
        <div style="font-size:11px;color:#aaa;">日期</div>
        <div style="font-size:11px;color:#aaa;">上午</div>
        <div style="font-size:11px;color:#aaa;">下午</div>
      </div>
      <div id="prefGrid"></div>
    </div>
  </div>
</div>

</div>

<div id="dayOverlay" class="overlay" onclick="overlayBgClick(event)">
  <div class="modal-box" id="modalBox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
      <div class="modal-title" id="modalTitle"></div>
      <button onclick="closeModal()" style="font-size:18px;padding:2px 8px;line-height:1;">&#x2715;</button>
    </div>
    <div class="modal-gap-row" id="modalGapRow" style="display:none;"></div>
    <div id="modalBody"></div>
<button style="width:100%;padding:11px;font-size:15px;margin-top:.5rem;" class="btn-blue" onclick="saveAndClose()">儲存並關閉</button>  </div>
</div>

<script>
var TARGET=31;
var COLORS=[['#E6F1FB','#0C447C'],['#E1F5EE','#085041'],['#FBEAF0','#72243E'],['#EEEDFE','#3C3489'],['#FAEEDA','#633806'],['#FAECE7','#712B13'],['#EAF3DE','#27500A'],['#FCEBEB','#791F1F']];
var MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
var DW=['日','一','二','三','四','五','六'];
var today=new Date(),vy=today.getFullYear(),vm=today.getMonth();
var ovy=vy,ovm=vm,staffY=vy,staffM=vm;
var currentUser=null;
var modalPid,modalD,modalY,modalM;

// --- 雲端設定區 ---
const AIRTABLE_TOKEN = 'patPgmAjSl1k1A8cY.b7a35d66c8af6534f68416f3cd39c3df4529dc3c65187f4d92a81b258bf01861'; 
const BASE_ID = 'appDKrrDajmGnfluF';            
const TABLE_NAME = 'SyncData';
let RECORD_ID = ''; 

let state = {
  staff:[{id:1,name:'許芸慈'},{id:2,name:'林欣汶'}],
  nextId:3,schedule:{},pref:{},
  weekTpl:[0,1,2,3,4,5,6].map(function(){return{am:false,amN:1,pm:false,pmN:1};})}; // 已修正括號

// --- 雲端同步函式 ---
async function loadFromCloud() {
  const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?filterByFormula={Name}='PrimaryConfig'`;
  try {
    const resp = await fetch(url, {
      headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
    });
    const res = await resp.json();
    if (res.records && res.records.length > 0) {
      RECORD_ID = res.records[0].id;
      if (res.records[0].fields.JSONContent) {
        state = JSON.parse(res.records[0].fields.JSONContent);
        console.log("雲端資料讀取成功");
        refreshStaffOpts(); 
      }
    }
  } catch (e) { console.error("雲端讀取失敗:", e); }
}

async function saveToCloud() {
  if (!RECORD_ID) { console.error("未獲取 RECORD_ID，無法存檔"); return; }
  const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${RECORD_ID}`;
  const body = { fields: { "JSONContent": JSON.stringify(state) } };
  try {
    await fetch(url, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    console.log("雲端同步完成");
  } catch (e) { console.error("雲端存檔失敗:", e); }
}

async function saveAndClose() {
  closeModal();
  await saveToCloud();
}

window.onload = function() {
  loadFromCloud();
};
// ... 後接原本的函式 (pad, mkey, t2n 等)
function pad(n){return n<10?'0'+n:''+n;}
function mkey(y,m){return y+'-'+pad(m+1);}
function t2n(t){var p=t.split(':');return +p[0]+ +p[1]/60;}
function calcH(s,e){if(!s||!e)return 0;var h=t2n(e)-t2n(s);return h<=0 ? 0 : h;}
function genTimes(){var t=[];for(var h=7;h<=20;h++){t.push(pad(h)+':00');if(h<20)t.push(pad(h)+':30');}return t;}
var TIMES=genTimes();
function getPdata(pid,y,m){var k=mkey(y,m);if(!state.schedule[k])state.schedule[k]={};if(!state.schedule[k][pid])state.schedule[k][pid]={};return state.schedule[k][pid];}
function getPref(d,y,m){return state.pref[mkey(y,m)+'-'+d]||{am:false,amN:1,pm:false,pmN:1};}
function setPref(d,data,y,m){state.pref[mkey(y,m)+'-'+d]=data;}
function monthHrs(pid,y,m){var dim=new Date(y,m+1,0).getDate(),total=0,pd=getPdata(pid,y,m);for(var d=1;d<=dim;d++){var day=pd[d];if(!day)continue;if(day.am&&day.ams&&day.ame)total+=calcH(day.ams,day.ame);if(day.pm&&day.pms&&day.pme)total+=calcH(day.pms,day.pme);}return total;}
function slotCount(d,slot,y,m){var k=mkey(y,m),n=0;state.staff.forEach(function(p){var day=((state.schedule[k]||{})[p.id]||{})[d];if(!day)return;if(slot==='am'&&day.am&&day.ams&&day.ame&&calcH(day.ams,day.ame)>0)n++;if(slot==='pm'&&day.pm&&day.pms&&day.pme&&calcH(day.pms,day.pme)>0)n++;});return n;}
function gapLabel(d,slot,y,m){var pr=getPref(d,y,m);var on=slot==='am'?pr.am:pr.pm;if(!on)return null;var need=slot==='am'?pr.amN:pr.pmN;var cur=slotCount(d,slot,y,m);var rem=need-cur;if(rem<=0)return{text:'已滿',cls:'gap-full'};return{text:'缺'+rem+'人',cls:'gap-need'};}
function doLogin(){var role=document.getElementById('loginRole').value;if(!role)return;if(role==='admin'){currentUser={role:'admin'};vy=today.getFullYear();vm=today.getMonth();showAdmin();}else{var pid=parseInt(role),p=state.staff.find(function(x){return x.id===pid;});if(!p)return;currentUser={role:'staff',pid:pid,name:p.name};ovy=today.getFullYear();ovm=today.getMonth();staffY=today.getFullYear();staffM=today.getMonth();showScreen('scr-overview');renderOv();}}
function goLogin(){currentUser=null;document.getElementById('loginRole').value='';showScreen('scr-login');refreshStaffOpts();}
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function showAdmin(){showScreen('scr-admin');renderAdmin();}
function goToOv(){showScreen('scr-overview');renderOv();}
function prevM_ov(){ovm--;if(ovm<0){ovm=11;ovy--;}renderOv();}
function nextM_ov(){ovm++;if(ovm>11){ovm=0;ovy++;}renderOv();}
function prevM_staff(){staffM--;if(staffM<0){staffM=11;staffY--;}renderStaff();}
function nextM_staff(){staffM++;if(staffM>11){staffM=0;staffY++;}renderStaff();}
function prevM(){vm--;if(vm<0){vm=11;vy--;}renderAdmin();}
function nextM(){vm++;if(vm>11){vm=0;vy++;}renderAdmin();}
function refreshStaffOpts(){var og=document.getElementById('staffOpts');og.innerHTML='';state.staff.forEach(function(p){var o=document.createElement('option');o.value=p.id;o.textContent=p.name;og.appendChild(o);});}
function renderOv(){
  var y=ovy,m=ovm;
  document.getElementById('ovMonLbl').textContent=y+'年 '+MONTHS[m];
  var btn=document.getElementById('ovActionBtn');
  if(currentUser&&currentUser.role==='staff'){btn.style.display='';btn.textContent='填寫排班 →';btn.onclick=function(){staffY=y;staffM=m;showScreen('scr-staff');renderStaff();};}else btn.style.display='none';
  var leg='';state.staff.forEach(function(p,i){leg+='<span style="font-size:12px;background:'+COLORS[i%8][0]+';color:'+COLORS[i%8][1]+';padding:2px 8px;border-radius:10px;margin:2px;display:inline-block;">'+p.name+'</span>';});
  document.getElementById('ovLegend').innerHTML=leg;
  var dim=new Date(y,m+1,0).getDate(),k=mkey(y,m),html='';
  for(var d=1;d<=dim;d++){
    var dow=new Date(y,m,d).getDay(),isWE=dow===0||dow===6,pr=getPref(d,y,m);
    var amArr=[],pmArr=[];
    state.staff.forEach(function(p,i){var day=((state.schedule[k]||{})[p.id]||{})[d];if(!day)return;if(day.am&&day.ams&&day.ame&&calcH(day.ams,day.ame)>0)amArr.push({p:p,i:i,s:day.ams,e:day.ame});if(day.pm&&day.pms&&day.pme&&calcH(day.pms,day.pme)>0)pmArr.push({p:p,i:i,s:day.pms,e:day.pme});});
    var amGap=gapLabel(d,'am',y,m),pmGap=gapLabel(d,'pm',y,m);
    var amPref=pr.am?'<span style="font-size:10px;background:#E1F5EE;color:#085041;border:1px solid #5DCAA5;padding:1px 4px;border-radius:3px;margin-right:2px;">偏好</span>':'';
    var pmPref=pr.pm?'<span style="font-size:10px;background:#FAEEDA;color:#633806;border:1px solid #FAC775;padding:1px 4px;border-radius:3px;margin-right:2px;">偏好</span>':'';
    html+='<div class="overview-row"><div style="font-size:12px;color:'+(isWE?'#A32D2D':'#666')+';line-height:1.5;padding-top:2px;text-align:center;">'+(m+1)+'/'+d+'<br>'+DW[dow]+'</div>';
    html+='<div class="ov-slots"><div class="ov-slot-row"><span class="ov-slot-lbl am">上午</span><div class="ov-chips">'+amPref+(amArr.length?amArr.map(function(x){return '<span style="display:inline-block;background:'+COLORS[x.i%8][0]+';color:'+COLORS[x.i%8][1]+';border-radius:8px;padding:2px 7px;font-size:11px;font-weight:500;">'+x.p.name+'<span style="font-size:9px;opacity:.7;"> '+x.s+'–'+x.e+'</span></span>';}).join(''):'<span style="font-size:11px;color:#aaa;">—</span>')+(amGap?'<span class="gap-pill '+amGap.cls+'" style="font-size:11px;padding:2px 6px;border-radius:4px;">'+amGap.text+'</span>':'')+'</div></div>';

function savePrefN(d,slot){var pr=getPref(d,vy,vm),u={am:pr.am,amN:pr.amN||1,pm:pr.pm,pmN:pr.pmN||1};var el=document.getElementById((slot==='am'?'pamN_':'ppmN_')+d);if(el)u[slot==='am'?'amN':'pmN']=parseInt(el.value);setPref(d,u,vy,vm);}
function addStaff(){var inp=document.getElementById('newName'),name=inp.value.trim();if(!name)return;state.staff.push({id:state.nextId++,name:name});inp.value='';refreshStaffOpts();renderAdmin();saveToCloud();}
function removeStaff(id){state.staff=state.staff.filter(function(p){return p.id!==id;});refreshStaffOpts();renderAdmin();saveToCloud();}
function doPrint(){var dim=new Date(vy,vm+1,0).getDate(),k=mkey(vy,vm),rows='';for(var d=1;d<=dim;d++){var dow=new Date(vy,vm,d).getDay(),isWE=dow===0||dow===6,pr=getPref(d,vy,vm),amL=[],pmL=[];state.staff.forEach(function(p){var day=((state.schedule[k]||{})[p.id]||{})[d];if(!day)return;if(day.am&&day.ams&&day.ame&&calcH(day.ams,day.ame)>0)amL.push(p.name+'('+day.ams+'–'+day.ame+')');if(day.pm&&day.pms&&day.pme&&calcH(day.pms,day.pme)>0)pmL.push(p.name+'('+day.pms+'–'+day.pme+')');});var amGap=gapLabel(d,'am',vy,vm),pmGap=gapLabel(d,'pm',vy,vm);var aGH=amGap?'<span style="font-size:9px;background:'+(amGap.cls==='gap-full'?'#E1F5EE':'#FAEEDA')+';color:'+(amGap.cls==='gap-full'?'#085041':'#633806')+';padding:0 4px;border-radius:2px;margin-left:2px;">'+amGap.text+'</span>':'';var pGH=pmGap?'<span style="font-size:9px;background:'+(pmGap.cls==='gap-full'?'#E1F5EE':'#FAEEDA')+';color:'+(pmGap.cls==='gap-full'?'#085041':'#633806')+';padding:0 4px;border-radius:2px;margin-left:2px;">'+pmGap.text+'</span>':'';rows+='<tr style="background:'+(isWE?'#f8f4ef':'#fff')+'"><td style="font-weight:700;text-align:center;white-space:nowrap;color:'+(dow===0?'#c0392b':dow===6?'#185FA5':'#333')+';border-right:2px solid #ddd;">'+(vm+1)+'/'+d+'<br><span style="font-size:10px;font-weight:400;color:#888;">'+DW[dow]+'</span></td><td style="border-right:1px solid #eee;">'+(pr.am?'<span style="font-size:9px;background:#E1F5EE;color:#085041;padding:0 4px;border-radius:2px;margin-right:2px;">偏好</span>':'')+(amL.length?amL.map(function(n){return '<span style="display:inline-block;background:#d4f5e6;color:#085041;border-radius:3px;padding:2px 6px;font-size:11px;margin:1px;">'+n+'</span>';}).join(''):'<span style="color:#bbb;font-size:11px;">—</span>')+aGH+'</td><td>'+(pr.pm?'<span style="font-size:9px;background:#FAEEDA;color:#633806;padding:0 4px;border-radius:2px;margin-right:2px;">偏好</span>':'')+(pmL.length?pmL.map(function(n){return '<span style="display:inline-block;background:#fde8c3;color:#633806;border-radius:3px;padding:2px 6px;font-size:11px;margin:1px;">'+n+'</span>';}).join(''):'<span style="color:#bbb;font-size:11px;">—</span>')+pGH+'</td></tr>';}var sr='';state.staff.forEach(function(p){var h=monthHrs(p.id,vy,vm),ok=h>=TARGET;sr+='<tr><td>'+p.name+'</td><td>'+h.toFixed(1)+' h</td><td style="color:'+(ok?'#0F6E56':'#A32D2D')+'">'+(ok?'已達標':'尚缺 '+(TARGET-h).toFixed(1)+'h')+'</td></tr>';});var w=window.open('','_blank');w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+vy+'年'+(vm+1)+'月班表</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;padding:20px;font-size:13px;}h1{font-size:20px;font-weight:700;margin-bottom:4px;}.sub{font-size:11px;color:#888;margin-bottom:12px;}.leg{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}.li{display:flex;align-items:center;gap:4px;font-size:11px;}.ld{width:12px;height:10px;border-radius:2px;}.sh{font-size:12px;font-weight:700;background:#333;color:#fff;padding:5px 10px;margin-bottom:0;}table{width:100%;border-collapse:collapse;margin-bottom:14px;}th{background:#555;color:#fff;padding:7px 10px;font-size:12px;text-align:left;}td{padding:6px 8px;border-bottom:0.5px solid #e0e0e0;vertical-align:middle;}.ft{font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:8px;margin-top:8px;display:flex;justify-content:space-between;}@media print{body{padding:8px;}@page{margin:.8cm;size:A4;}}</style></head><body><h1>'+vy+' 年 '+MONTHS[vm]+' 班表</h1><div class="sub">共 '+state.staff.length+' 位人員　目標：'+TARGET+'h／人</div><div class="leg"><div class="li"><div class="ld" style="background:#d4f5e6;"></div>上午班</div><div class="li"><div class="ld" style="background:#fde8c3;"></div>下午班</div><div class="li"><div class="ld" style="background:#FAEEDA;border:1px solid #FAC775;"></div>管理者偏好</div></div><div class="sh">每日上下午出班人員</div><table><thead><tr><th style="width:50px;">日期</th><th style="width:50%;">上午班</th><th>下午班</th></tr></thead><tbody>'+rows+'</tbody></table><div class="sh">人員工時統計</div><table><thead><tr><th>姓名</th><th>本月總工時</th><th>狀態</th></tr></thead><tbody>'+sr+'</tbody></table><div class="ft"><span>'+vy+' 年 '+MONTHS[vm]+'　共 '+dim+' 天</span><span>列印：'+new Date().toLocaleString('zh-TW')+'</span></div><scr'+'ipt>window.onload=function(){window.print()};<\/script></body></html>');w.document.close();}
